apiVersion: apps/v1
kind: Deployment
metadata:
    name: survey-deployment
    labels:
        app: survey-app
spec:
    replicas: 3
    selector:
        matchLabels:
            app: survey-app
    template:
        metadata:
            labels:
                app: survey-app
        spec:
            containers:
                - name: survey-app
                  image: kmcshane/survey-app-hw2:latest
                  ports:
                      - containerPort: 80
